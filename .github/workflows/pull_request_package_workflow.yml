name: Pull Request Python Package

on:
    pull_request:
        branches: [ "main" ]
        paths:
            - 'cvmatrix/**'
            - 'tests/**'
            - '.github/**'
            - 'pyproject.toml'
            - 'uv.lock'

jobs:
    build_package:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/build